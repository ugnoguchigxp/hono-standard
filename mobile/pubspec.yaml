publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  go_router: ^14.6.2
  dio: ^5.7.0
  intl: ^0.20.2
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  fquery: ^3.0.2+1
  fquery_core: ^3.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/locales/
