name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  web-and-api:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: hono_standard
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/hono_standard
      JWT_SECRET: ci-jwt-secret-key-at-least-32-characters
      AUTH_MODE: local
      NODE_ENV: test
      CORS_ORIGIN: http://localhost:5173
      LOG_LEVEL: error
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run db:migrate
      - run: pnpm exec vitest run --maxWorkers=1
      - run: pnpm run typecheck
      - run: pnpm run lint
      - run: pnpm run build

  mobile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.27.1'
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
